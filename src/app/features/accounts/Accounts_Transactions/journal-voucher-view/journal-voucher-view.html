<div class="screen-container">
    <div class="screen-card">

        <!-- HEADER -->
        <div class="screen-header">
            <h2 class="screen-title">Journal Voucher View</h2>
        </div>

        <div class="screen-body">

            <!-- TOOLBAR -->
            <div class="toolbar-row">
                <a routerLink="/dashboard/accounts/accounts-transactions/journal-voucher" class="btn-new">
                    + New
                </a>

                <div class="search-wrapper">
                    <i class="pi pi-search search-icon"></i>
                    <input type="text" class="search-input" placeholder="Search..." (keyup)="filterDatatable($event)" />
                </div>
            </div>

            <!-- TABLE CARD -->
            <div class="table-card">
                <p-table #dt [value]="Journalvoucherlist" dataKey="pjvnumber" [rows]="pageCriteria.pageSize"
                    [paginator]="false" [totalRecords]="pageCriteria.totalrows" [rowsPerPageOptions]="[10, 20, 50]"
                    [showCurrentPageReport]="true" scrollable="true" scrollHeight="400px" [resizableColumns]="true"
                    columnResizeMode="fit" styleClass="p-datatable-sm p-datatable-gridlines">

                    <!-- HEADER -->
                    <ng-template pTemplate="header">
                        <tr>
                            <th class="col-actions th-base">Actions</th>
                            <th pSortableColumn="jvDate" class="col-date th-base th-sortable">
                                JV Date &nbsp;<i class="pi pi-sort-alt sort-icon"></i>
                            </th>
                            <th pSortableColumn="journalVoucherNo" class="col-jvno th-base th-sortable">
                                Journal Voucher No &nbsp;<i class="pi pi-sort-alt sort-icon"></i>
                            </th>
                            <th pSortableColumn="amount" class="col-amount th-base th-sortable th-right">
                                Amount &nbsp;<i class="pi pi-sort-alt sort-icon"></i>
                            </th>
                            <th class="col-narration th-base">Narration</th>
                        </tr>
                    </ng-template>

                    <!-- BODY -->
                    <ng-template pTemplate="body" let-row>
                        <tr>
                            <td class="td-center td-base">
                                <button pButton type="button" icon="pi pi-eye"
                                    class="p-button-text p-button-sm p-button-primary btn-view"
                                    (click)="viewHandler($event, row)">
                                </button>
                            </td>

                            <td class="td-center td-base td-text">
                                {{ row.jvDate || '--' }}
                            </td>

                            <td class="td-center td-base td-text">
                                {{ row.journalVoucherNo || '--' }}
                            </td>

                            <td class="td-right td-base td-text">
                                {{ row.amount | currency:'INR':'symbol':'1.2-2' }}
                            </td>

                            <td class="td-base td-text">
                                {{ row.narration || '-- NA --' }}
                            </td>
                        </tr>
                    </ng-template>

                    <!-- EMPTY -->
                    <ng-template pTemplate="emptymessage">
                        <tr>
                            <td colspan="5" class="td-empty">No records found</td>
                        </tr>
                    </ng-template>

                </p-table>
            </div>

        </div>
    </div>
</div>
