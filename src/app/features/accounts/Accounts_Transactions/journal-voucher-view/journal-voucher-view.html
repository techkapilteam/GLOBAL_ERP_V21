<div class="module-page">
    <div class="erp-card">

        <!-- HEADER -->
        <div class="card-header">
            <h2 class="page-title">Journal Voucher View</h2>
        </div>

        <div class="grid-body">

            <!-- TOOLBAR -->
            <div class="toolbar">
                <a routerLink="/dashboard/accounts/accounts-transactions/journal-voucher" class="btn-new">
                    + New
                </a>

                <div class="search-container">
                    <i class="pi pi-search search-icon"></i>
                    <input type="text" class="erp-input" placeholder="Search..." (keyup)="filterDatatable($event)" />
                </div>
            </div>

            <!-- TABLE CARD -->
            <div class="table-card">
                <p-table #dt [value]="Journalvoucherlist" dataKey="pjvnumber" [rows]="pageCriteria.pageSize"
                    [paginator]="false" [totalRecords]="pageCriteria.totalrows" [rowsPerPageOptions]="[10, 20, 50]"
                    [showCurrentPageReport]="true" scrollable="true" scrollHeight="400px" [resizableColumns]="true"
                    columnResizeMode="fit" styleClass="p-datatable-sm p-datatable-gridlines">

                    <!-- HEADER -->
                    <ng-template pTemplate="header">
                        <tr>
                            <th class="col-actions grid-header-base">Actions</th>
                            <th pSortableColumn="jvDate" class="col-date grid-header-base grid-header-sortable">
                                JV Date &nbsp;<i class="pi pi-sort-alt sort-icon"></i>
                            </th>
                            <th pSortableColumn="journalVoucherNo" class="col-jvno grid-header-base grid-header-sortable">
                                Journal Voucher No &nbsp;<i class="pi pi-sort-alt sort-icon"></i>
                            </th>
                            <th pSortableColumn="amount" class="col-amount grid-header-base grid-header-sortable grid-header-right">
                                Amount &nbsp;<i class="pi pi-sort-alt sort-icon"></i>
                            </th>
                            <th class="col-narration grid-header-base">Narration</th>
                        </tr>
                    </ng-template>

                    <!-- BODY -->
                    <ng-template pTemplate="body" let-row>
                        <tr>
                            <td class="grid-cell-center grid-cell-base">
                                <button pButton type="button" icon="pi pi-eye"
                                    class="p-button-text p-button-sm p-button-primary btn-view"
                                    (click)="viewHandler($event, row)">
                                </button>
                            </td>

                            <td class="grid-cell-center grid-cell-base grid-cell-text">
                                {{ row.jvDate || '--' }}
                            </td>

                            <td class="grid-cell-center grid-cell-base grid-cell-text">
                                {{ row.journalVoucherNo || '--' }}
                            </td>

                            <td class="grid-cell-right grid-cell-base grid-cell-text">
                                {{ row.amount | currency:'INR':'symbol':'1.2-2' }}
                            </td>

                            <td class="grid-cell-base grid-cell-text">
                                {{ row.narration || '-- NA --' }}
                            </td>
                        </tr>
                    </ng-template>

                    <!-- EMPTY -->
                    <ng-template pTemplate="emptymessage">
                        <tr>
                            <td colspan="5" class="grid-cell-empty">No records found</td>
                        </tr>
                    </ng-template>

                </p-table>
            </div>

        </div>
    </div>
</div>
