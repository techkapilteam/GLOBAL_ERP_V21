<div class="screen-container">
  <div class="screen-card">

    <!-- Header -->
    <div class="screen-header">
      <h2 class="screen-title">Schedule TB</h2>
    </div>

    <!-- Content -->
    <div class="section-content">
      <form name="ScheduleTB" novalidate #scheduleTBForm="ngForm"
        (ngSubmit)="print(scheduleTBForm)">

        <div class="filter-panel">

          <!-- Date Field -->
          <div class="filter-field">
            <label class="field-label" for="asOnDate">
              As On Date <span class="required">*</span>
            </label>
            <div class="field-row">
              <p-datepicker name="asOnDate" required #asOnDateRef="ngModel" [(ngModel)]="asOnDate" id="asOnDate" dateFormat="dd-M-yy" placeholder="DD-MMM-YYYY" [readonlyInput]="true" appendTo="body" styleClass="w-100" inputStyleClass="form-control date-input w-100" [maxDate]="pDatepickerMaxDate"></p-datepicker>

              <!-- Submit Button -->
              <button
                type="submit"
                class="btn btn-primary submit-btn"
                [disabled]="loading()"
              >
                <i class="fa fa-print"></i>
                {{ btnPrint() }}
              </button>
            </div>

            @if ((asOnDateRef.dirty || submitted()) && asOnDateRef.errors?.['required']) {
              <div class="erp-field-error">As On Date is required.</div>
            }
          </div>

        </div>

        <!-- Error Alert -->
        @if (errorMsg()) {
          <div class="alert alert-danger error-alert">
            {{ errorMsg() }}
          </div>
        }

      </form>
    </div>

  </div>
</div>
