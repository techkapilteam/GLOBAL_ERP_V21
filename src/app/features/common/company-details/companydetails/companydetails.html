<div class="company-wrapper">

  <div class="company-header">
    <h2 class="company-name">{{ companyName() }}</h2>
    <p class="company-address">{{ registrationAddress() }}</p>

    @if (hasCinNumber()) {
      <p class="company-cin">CIN : {{ cinNumber() }}</p>
    }
  </div>

  <div class="company-meta">
    <div class="company-meta__spacer"></div>

    @if (printedDateShowhide()) {
      <p class="company-branch">
        Branch : {{ branchName() | titlecase }}
      </p>
    }
  </div>

</div>
